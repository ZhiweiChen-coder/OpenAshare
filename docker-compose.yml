services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      BACKEND_BASE_URL: http://backend:8000
    restart: unless-stopped
